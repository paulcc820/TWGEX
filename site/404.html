<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 · 找不到頁面 | TWGEX</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#F7F6F3">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F7F6F3;--ink:#1A1A18;--muted:#6E6B63;--border:#E4E2DC;--serif:'Newsreader',Georgia,serif;--mono:'JetBrains Mono',ui-monospace,monospace;--sans:'Helvetica Neue',Arial,'PingFang TC','Microsoft JhengHei',sans-serif;}
  *{box-sizing:border-box;} html,body{margin:0;min-height:100%;}
  body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
  .gbox{display:inline-flex;align-items:center;justify-content:center;width:46px;height:46px;border:2px solid var(--ink);border-radius:11px;margin-bottom:18px;}
  .gbox span{font-family:var(--serif);font-size:28px;font-weight:500;line-height:1;}
  .code{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:0.14em;}
  h1{font-family:var(--serif);font-size:30px;font-weight:500;margin:10px 0 8px;}
  p{color:var(--muted);font-size:15px;line-height:1.6;margin:0 0 24px;}
  a{display:inline-block;font-family:var(--mono);font-size:13px;color:var(--ink);border:1px solid var(--ink);border-radius:7px;padding:9px 18px;text-decoration:none;}
</style>
</head>
<body>
  <div>
    <span class="gbox"><span>&#947;</span></span>
    <div class="code">404 · NOT FOUND</div>
    <h1>找不到這個頁面</h1>
    <p>這條路徑不存在或已移動。<br>This page could not be found.</p>
    <a href="/">← 回首頁 · TWGEX</a>
  </div>
</body>
</html>
