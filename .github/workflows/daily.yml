name: TWGEX daily refresh

# 每天盤後在 GitHub 雲端自動：抓最新公開資料 → 算 data.json → 發布到 Pages。
# 你的電腦不用開機。資料源全是 TWSE/TAIFEX/FinMind 公開端點，匿名即可，無需任何金鑰。

on:
  schedule:
    - cron: "0 8 * * 1-5"    # 台灣 16:00（每週一~五，盤後約 2.5h，資料已就緒）
    - cron: "0 10 * * 1-5"   # 台灣 18:00（備援：若 16:00 被 GitHub 延遲）
    - cron: "0 12 * * 1-5"   # 台灣 20:00（備援：再補一次，確保當晚更新）
  workflow_dispatch: {}        # 也可在 Actions 頁面手動點「Run workflow」

permissions:
  contents: write   # 允許 CI 把更新後的種子資料 commit 回 repo（自我維護，不需本機手動推）
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout（含已提交的種子資料）
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: 抓最新市場資料（增量：種子最後日期 → 今天）
        run: python fetch_market.py
        env:
          # 選配：到 Settings → Secrets → Actions 設 FINMIND_TOKEN 可提高速率；沒設也能匿名跑。
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}

      - name: 自動推進種子（CI 自我維護，不需本機 push）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/market/
          if git diff --cached --quiet; then
            echo "種子無變動，略過 commit"
          else
            LAST=$(tail -1 data/market/taiex_daily.csv | cut -d',' -f1)
            git commit -m "data: CI 自動推進種子至 ${LAST}"
            git push
          fi

      - name: 計算 data.json
        run: python compute.py

      - name: 打包 site/ 為 Pages 產物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: 發布到 GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

# 設計說明：
#   每次都從「已提交的種子資料」全新開始 → 只補抓種子最後日期到今天的缺口 → 算完直接發布。
#   fetch 完成後自動把種子 commit 回 repo（contents: write）→ 下次只需補今天一天，永不需要本機介入。
#   若某天 push 失敗（衝突等罕見情況），下次 CI 重新補抓，自動自癒。
